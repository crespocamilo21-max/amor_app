<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Historia 💖</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

input,button{
padding:10px;
margin:10px;
border-radius:10px;
border:none;
}

/* CONTENIDO */
#app{display:none;}

/* VIDEO (SLIDESHOW) */
.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:1s;
}
.active{opacity:1}

/* TEXTO */
.overlay{
position:absolute;
bottom:20%;
width:100%;
font-size:24px;
}

/* BOTON */
.btn{
background:white;
color:black;
padding:10px 20px;
border-radius:20px;
}

/* CORAZONES */
.heart{
position:absolute;
bottom:0;
animation:up 5s linear infinite;
}
@keyframes up{
to{transform:translateY(-100vh);opacity:0;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>🔒 Solo nosotros 💖</h2>
<input type="password" id="pass">
<button onclick="entrar()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

<img src="foto1.jpg" class="slide active">
<img src="foto2.jpg" class="slide">
<img src="foto3.jpg" class="slide">

<div class="overlay">
<p id="texto">Nuestro primer mes 💖</p>
<button class="btn" onclick="sorpresa()">Sorpresa</button>
<button class="btn" onclick="playAudio()">🎙️ Escúchame</button>
</div>

<audio id="music" loop>
<source src="voz.m4a">
</audio>

<audio id="voz">
<source src="voz.m4a">
</audio>

</div>

<script>

// LOGIN
function entrar(){
if(document.getElementById("pass").value==="0503"){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("music").play();
}
}

// SLIDES
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

// TEXTO DINÁMICO
let textos=[
"Desde que llegaste todo cambió 💖",
"Eres mi lugar favorito",
"Gracias por este primer mes",
"Te elegiría mil veces más"
];
let t=0;
setInterval(()=>{
document.getElementById("texto").innerText=textos[t];
t=(t+1)%textos.length;
},4000);

// SORPRESA
function sorpresa(){
alert("Te amo más de lo que puedo explicar 💖");
}

// VOZ
function playAudio(){
document.getElementById("voz").play();
}

// CORAZONES
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerText="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);

</script>

</body>
</html>
